name: pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "data/**"
  workflow_run:
    workflows: ["scrape"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  pages: write
  id-token: write
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Assemble site (docs + data)
        run: |
          mkdir _site
          cp -r docs/. _site/
          mkdir _site/data
          cp data/*.json _site/data/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v4
